version: "2"
linters:
  default: standard
  enable:
    - revive
    - gocritic
    - misspell
    - bodyclose
    - unconvert
    - gosec
  exclusions:
    rules:
      # Tests legitimately read variable paths and don't close stub response
      # bodies; these checks add noise without protecting production code.
      - path: _test\.go
        linters:
          - gosec
          - bodyclose
formatters:
  enable:
    - gofmt
    - goimports
